# Default configuration for the WebSearch module.
# These values are auto-merged into the main config at startup.
# Override any of them by adding a `WebSearch:` section to root config.yaml.

WebSearch:
  name: WebSearch
  storage_directory: /mnt/project_config/modules/WebSearch
  crawl_delay: 0.5          # seconds between HTTP requests
  max_pages_per_site: 300    # BFS page limit per domain
